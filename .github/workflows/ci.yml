name: CI

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Product rules
        run: npm run check:product-rules

      - name: Design tokens
        run: npm run check:design-tokens

      - name: Tauri boundaries
        run: npm run check:tauri-boundaries

      - name: i18n messages
        run: npm run check:i18n

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook
