    <path d="M296 426c34-96 118-156 220-162" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" opacity=".72"/>
    <path d="M324 388c30-52 82-86 150-98" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity=".86"/>
